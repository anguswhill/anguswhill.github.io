<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Critter Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --grass: #6abe5a;
    --grass-dark: #4a8f3a;
    --grass-tall: #2f6e25;
    --water: #4aa3df;
    --sand: #e8d49a;
    --rock: #8a8478;
    --night: #1a1428;
    --cream: #fff5dc;
    --ink: #221f1c;
    --accent: #ff5a3c;
    --gold: #ffcb47;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0e0a18;
    font-family: 'VT323', monospace;
    color: var(--cream);
    overflow: hidden;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at top, #2a1f3d 0%, #0e0a18 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);
    padding: 12px;
  }
  .frame {
    width: min(560px, 100%);
    background: #2a1f3d;
    border: 4px solid var(--cream);
    border-radius: 6px;
    box-shadow:
      0 0 0 4px var(--ink),
      0 12px 0 0 rgba(0,0,0,0.5),
      0 0 60px rgba(255,90,60,0.15);
    padding: 14px;
    position: relative;
  }
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--gold);
  }
  .titlebar .dot {
    width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 50% { opacity: 0.2; } }

canvas {
display: block;
width: 100%;
aspect-ratio: 1 / 1;
background: var(–grass);
border: 3px solid var(–ink);
image-rendering: pixelated;
}

.hud {
margin-top: 10px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
font-size: 22px;
}
.hud .pill {
background: var(–ink);
border: 2px solid var(–cream);
padding: 6px 10px;
display: flex;
justify-content: space-between;
align-items: center;
}
.hud .label {
font-family: ‘Press Start 2P’, monospace;
font-size: 8px;
color: var(–gold);
letter-spacing: 1px;
}
.hud .val { color: var(–cream); }

.msgbox {
margin-top: 10px;
background: var(–cream);
color: var(–ink);
border: 3px solid var(–ink);
padding: 12px 14px;
font-size: 22px;
min-height: 70px;
line-height: 1.2;
position: relative;
}
.msgbox::after {
content: ‘▼’;
position: absolute;
bottom: 6px; right: 10px;
font-size: 12px;
animation: bob 0.8s infinite;
opacity: 0.6;
}
@keyframes bob { 50% { transform: translateY(3px); } }

.battle {
display: none;
margin-top: 10px;
background: var(–cream);
color: var(–ink);
border: 3px solid var(–ink);
padding: 12px;
}
.battle.active { display: block; }
.battle h3 {
font-family: ‘Press Start 2P’, monospace;
font-size: 10px;
margin-bottom: 8px;
color: var(–accent);
letter-spacing: 1px;
}
.hpbar {
background: #444;
border: 2px solid var(–ink);
height: 14px;
margin-bottom: 8px;
position: relative;
overflow: hidden;
}
.hpbar > div {
height: 100%;
background: linear-gradient(90deg, #ff3a3a, #ffb83a);
transition: width 0.3s;
}
.actions {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-top: 8px;
}
button.act {
font-family: ‘Press Start 2P’, monospace;
font-size: 9px;
padding: 10px;
background: var(–ink);
color: var(–gold);
border: 2px solid var(–ink);
cursor: pointer;
letter-spacing: 1px;
transition: transform 0.05s;
}
button.act:hover { background: var(–accent); color: var(–cream); }
button.act:active { transform: translateY(2px); }
button.act:disabled { opacity: 0.4; cursor: not-allowed; }

.controls-help {
margin-top: 8px;
font-size: 16px;
text-align: center;
color: rgba(255,245,220,0.6);
font-family: ‘Press Start 2P’, monospace;
font-size: 7px;
letter-spacing: 1px;
}

.dpad {
margin-top: 12px;
display: grid;
grid-template-columns: 60px 60px 60px;
grid-template-rows: 60px 60px 60px;
gap: 4px;
justify-content: center;
user-select: none;
-webkit-user-select: none;
touch-action: manipulation;
}
.dpad button {
background: var(–ink);
color: var(–gold);
border: 3px solid var(–cream);
font-family: ‘Press Start 2P’, monospace;
font-size: 18px;
cursor: pointer;
border-radius: 4px;
box-shadow: 0 4px 0 rgba(0,0,0,0.5);
transition: transform 0.05s, box-shadow 0.05s;
}
.dpad button:active {
transform: translateY(3px);
box-shadow: 0 1px 0 rgba(0,0,0,0.5);
background: var(–accent);
color: var(–cream);
}
.dpad .up    { grid-column: 2; grid-row: 1; }
.dpad .left  { grid-column: 1; grid-row: 2; }
.dpad .right { grid-column: 3; grid-row: 2; }
.dpad .down  { grid-column: 2; grid-row: 3; }
.dpad .center {
grid-column: 2; grid-row: 2;
background: #2a1f3d;
border: 3px solid var(–ink);
box-shadow: none;
cursor: default;
pointer-events: none;
}

.dexbtn {
margin-top: 10px;
width: 100%;
background: var(–ink);
color: var(–gold);
border: 3px solid var(–cream);
font-family: ‘Press Start 2P’, monospace;
font-size: 10px;
letter-spacing: 1px;
padding: 12px;
cursor: pointer;
box-shadow: 0 4px 0 rgba(0,0,0,0.5);
transition: transform 0.05s, box-shadow 0.05s;
}
.dexbtn:active {
transform: translateY(3px);
box-shadow: 0 1px 0 rgba(0,0,0,0.5);
background: var(–accent);
color: var(–cream);
}
.dexbtn .count { color: var(–cream); margin-left: 4px; }

/* Pokédex modal */
.modal {
position: fixed;
inset: 0;
background: rgba(10, 6, 20, 0.85);
display: none;
align-items: center;
justify-content: center;
z-index: 100;
padding: 16px;
-webkit-backdrop-filter: blur(2px);
backdrop-filter: blur(2px);
}
.modal.open { display: flex; }
.modal-inner {
background: #2a1f3d;
border: 4px solid var(–cream);
border-radius: 6px;
box-shadow: 0 0 0 4px var(–ink), 0 0 60px rgba(255, 203, 71, 0.3);
width: min(520px, 100%);
max-height: 90vh;
display: flex;
flex-direction: column;
overflow: hidden;
}
.modal-head {
padding: 12px 14px;
background: var(–ink);
border-bottom: 3px solid var(–cream);
display: flex;
justify-content: space-between;
align-items: center;
font-family: ‘Press Start 2P’, monospace;
font-size: 11px;
color: var(–gold);
letter-spacing: 1px;
}
.modal-close {
background: var(–accent);
color: var(–cream);
border: 2px solid var(–cream);
font-family: ‘Press Start 2P’, monospace;
font-size: 10px;
padding: 6px 10px;
cursor: pointer;
letter-spacing: 1px;
}
.modal-close:active { transform: translateY(2px); }
.modal-body {
padding: 12px;
overflow-y: auto;
flex: 1;
}
.dex-progress {
background: var(–ink);
border: 2px solid var(–cream);
padding: 8px 10px;
margin-bottom: 10px;
font-family: ‘Press Start 2P’, monospace;
font-size: 9px;
color: var(–cream);
letter-spacing: 1px;
text-align: center;
}
.dex-progress .gold { color: var(–gold); }
.dex-grid {
display: grid;
grid-template-columns: 1fr;
gap: 8px;
}
.dex-card {
display: grid;
grid-template-columns: 64px 1fr auto;
gap: 10px;
align-items: center;
background: var(–cream);
color: var(–ink);
border: 3px solid var(–ink);
padding: 8px;
}
.dex-card.uncaught {
background: #1a1428;
color: rgba(255, 245, 220, 0.4);
border-color: rgba(255, 245, 220, 0.2);
}
.dex-card canvas {
width: 64px;
height: 64px;
image-rendering: pixelated;
background: rgba(0, 0, 0, 0.08);
border: 2px solid var(–ink);
}
.dex-card.uncaught canvas {
filter: brightness(0) opacity(0.35);
border-color: rgba(255, 245, 220, 0.2);
}
.dex-card .info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.dex-card .name {
font-family: ‘Press Start 2P’, monospace;
font-size: 9px;
letter-spacing: 1px;
}
.dex-card .desc {
font-size: 16px;
line-height: 1.15;
}
.dex-card .rarity {
font-family: ‘Press Start 2P’, monospace;
font-size: 8px;
color: var(–accent);
letter-spacing: 1px;
white-space: nowrap;
}
.dex-card.uncaught .rarity { color: rgba(255, 245, 220, 0.4); }

/* Catch animation overlay */
.flash {
position: absolute;
inset: 0;
background: var(–cream);
opacity: 0;
pointer-events: none;
transition: opacity 0.15s;
}
.flash.on { opacity: 0.9; }
</style>

</head>
<body>
<div class="frame">
  <div class="titlebar">
    <span>◆ CRITTER QUEST ◆</span>
    <span class="dot"></span>
  </div>

<canvas id="game" width="160" height="160"></canvas>

  <div class="hud">
    <div class="pill"><span class="label">BALLS</span><span class="val" id="balls">10</span></div>
    <div class="pill"><span class="label">CAUGHT</span><span class="val" id="caught">0</span></div>
    <div class="pill"><span class="label">BIOMATTER</span><span class="val" id="partBiomatter">0</span></div>
    <div class="pill"><span class="label">SHELL</span><span class="val" id="partShell">0</span></div>
    <div class="pill"><span class="label">SPARK</span><span class="val" id="partSpark">0</span></div>
  </div>

  <div class="msgbox" id="msg">Welcome! Walk into tall grass to find wild critters. Use arrow keys or WASD.</div>

  <div class="battle" id="battle">
    <h3 id="battleName">A wild critter appeared!</h3>
    <div class="hpbar"><div id="hpfill" style="width:100%"></div></div>
    <div id="battleDesc" style="font-size:18px; line-height:1.2;"></div>
    <div class="actions">
      <button class="act" id="actThrow">THROW BALL</button>
      <button class="act" id="actBait">BAIT</button>
      <button class="act" id="actRock">ROCK</button>
      <button class="act" id="actRun">RUN</button>
    </div>
  </div>

<button class="dexbtn" id="openDex">📖 OPEN CRITTERDEX <span class="count" id="dexCount">(0/7)</span></button>

  <div class="dpad">
    <button class="up"    id="btnUp">▲</button>
    <button class="left"  id="btnLeft">◀</button>
    <button class="center"></button>
    <button class="right" id="btnRight">▶</button>
    <button class="down"  id="btnDown">▼</button>
  </div>

  <div class="controls-help">TAP D-PAD OR USE ARROWS / WASD</div>
</div>

<!-- Pokédex modal -->

<div class="modal" id="dexModal">
  <div class="modal-inner">
    <div class="modal-head">
      <span>◆ CRITTERDEX ◆</span>
      <button class="modal-close" id="closeDex">CLOSE</button>
    </div>
    <div class="modal-body">
      <div class="dex-progress">CAUGHT: <span class="gold" id="dexProgress">0 / 7</span></div>
      <div class="dex-grid" id="dexGrid"></div>
    </div>
  </div>
</div>

<script>
// Global error reporter — show errors visibly instead of silent "Script error"
window.addEventListener('error', e => {
  const msg = document.getElementById('msg');
  if (msg) {
    msg.style.background = '#ffcccc';
    msg.textContent = 'ERROR: ' + (e.message || 'unknown') + ' (line ' + (e.lineno || '?') + ')';
  }
});

// ============================================================
// CRITTER QUEST — a tiny catch-'em game
// ============================================================

const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

const TILE = 16;
const COLS = 10;
const ROWS = 10;

// Tile types
const G = 0; // grass
const T = 1; // tall grass
const W = 2; // water
const R = 3; // rock
const S = 4; // sand path
const F = 5; // flower

// Hand-built map
const MAP = [
  [G,G,F,G,T,T,T,G,G,R],
  [G,S,S,S,T,T,T,G,R,R],
  [F,S,G,S,S,G,G,G,G,G],
  [G,S,G,G,S,S,S,F,G,G],
  [G,S,G,W,W,W,S,G,T,T],
  [G,S,G,W,W,W,S,G,T,T],
  [G,S,G,G,G,G,S,G,T,T],
  [G,F,G,T,T,G,S,S,S,G],
  [R,G,G,T,T,G,G,F,S,G],
  [R,R,G,G,G,G,G,G,S,G],
];

// Player
const player = { x: 1, y: 9, dir: 'up', frame: 0, moving: false };

// Critters — original designs, not Pokemon
const CRITTERS = [
  { name: 'BLOBLET',   color: '#7ed957', accent: '#3a8a1f', desc: 'A bouncy plant-blob. Mostly harmless.', rarity: 1, drops: [{ part: 'biomatter', min: 1, max: 3 }] },
  { name: 'EMBERFOX',  color: '#ff7a3a', accent: '#b03a1a', desc: 'Crackles when curious. Tail glows.',    rarity: 2, drops: [{ part: 'spark', min: 1, max: 2 }, { part: 'biomatter', min: 1, max: 1 }] },
  { name: 'PUDDLOPS',  color: '#5ec6ff', accent: '#2a6f9a', desc: 'A one-eyed water sprite. Very polite.', rarity: 2, drops: [{ part: 'biomatter', min: 1, max: 2 }] },
  { name: 'SHROOMP',   color: '#c95df0', accent: '#6a2a8a', desc: 'Hums softly. Smells like rain.',        rarity: 3, drops: [{ part: 'biomatter', min: 2, max: 3 }] },
  { name: 'PEBBLOR',   color: '#a08c70', accent: '#5a4a30', desc: 'Heavy. Stubborn. Surprisingly sweet.',  rarity: 3, drops: [{ part: 'shell', min: 1, max: 2 }] },
  { name: 'MOTHWING',  color: '#f0d74a', accent: '#a07a10', desc: 'Drawn to lanterns and bad ideas.',      rarity: 4, drops: [{ part: 'spark', min: 1, max: 3 }] },
  { name: 'GLIMMERAT', color: '#e8e8f0', accent: '#7a7a90', desc: 'Hoards shiny things. Rarely seen.',     rarity: 5, drops: [{ part: 'shell', min: 1, max: 1 }, { part: 'spark', min: 1, max: 2 }] },
];

// Wild critter (in battle)
let wild = null;
let wildHP = 0;
let wildHPMax = 0;
let catchBonus = 0; // baiting/rocks modify this
let inBattle = false;
const caught = new Set();
let balls = 10;
const parts = { biomatter: 0, shell: 0, spark: 0 };

// Ball pickups scattered on the map. Each respawns ~30s after collection.
const PICKUP_SPOTS = [
  { x: 7, y: 0 }, { x: 3, y: 2 }, { x: 0, y: 4 },
  { x: 9, y: 5 }, { x: 5, y: 7 }, { x: 1, y: 8 },
  { x: 8, y: 3 }, { x: 6, y: 9 },
];
// active = currently collectable; respawnAt = timestamp when it returns
const pickups = PICKUP_SPOTS.map(p => ({ ...p, active: true, respawnAt: 0 }));

function tickPickups() {
  const now = Date.now();
  let changed = false;
  for (const p of pickups) {
    if (!p.active && now >= p.respawnAt) {
      p.active = true;
      changed = true;
    }
  }
  if (changed && !inBattle) render();
}
setInterval(tickPickups, 1000);

// Sprite cache
const spriteCache = {};
function getSprite(name) {
  if (spriteCache[name]) return spriteCache[name];
  const c = CRITTERS.find(x => x.name === name);
  const off = document.createElement('canvas');
  off.width = 32; off.height = 32;
  const o = off.getContext('2d');
  o.imageSmoothingEnabled = false;
  drawCritter(o, c, 0, 0);
  spriteCache[name] = off;
  return off;
}

// ============================================================
// DRAWING
// ============================================================

function drawTile(t, x, y) {
  const px = x * TILE, py = y * TILE;

  // Base grass for everything
  ctx.fillStyle = '#6abe5a';
  ctx.fillRect(px, py, TILE, TILE);
  // grass speckle
  ctx.fillStyle = '#5aa84a';
  ctx.fillRect(px+2, py+3, 2, 1);
  ctx.fillRect(px+9, py+11, 2, 1);

  if (t === T) {
    // tall grass
    ctx.fillStyle = '#3a8a2a';
    for (let i = 0; i < TILE; i += 4) {
      ctx.fillRect(px+i, py+8, 1, 6);
      ctx.fillRect(px+i+2, py+10, 1, 4);
    }
    ctx.fillStyle = '#2f6e25';
    ctx.fillRect(px, py+14, TILE, 2);
  } else if (t === W) {
    ctx.fillStyle = '#4aa3df';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = '#7ac0ee';
    ctx.fillRect(px+2, py+4, 4, 1);
    ctx.fillRect(px+9, py+10, 4, 1);
    ctx.fillStyle = '#2a6f9a';
    ctx.fillRect(px+5, py+12, 3, 1);
  } else if (t === R) {
    ctx.fillStyle = '#8a8478';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = '#6a6458';
    ctx.fillRect(px+2, py+2, 5, 5);
    ctx.fillRect(px+9, py+8, 5, 5);
    ctx.fillStyle = '#a8a298';
    ctx.fillRect(px+3, py+3, 2, 2);
  } else if (t === S) {
    ctx.fillStyle = '#e8d49a';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = '#c8b47a';
    ctx.fillRect(px+3, py+5, 1, 1);
    ctx.fillRect(px+10, py+11, 1, 1);
  } else if (t === F) {
    // flower
    ctx.fillStyle = '#ff5a8a';
    ctx.fillRect(px+6, py+6, 4, 4);
    ctx.fillStyle = '#ffcb47';
    ctx.fillRect(px+7, py+7, 2, 2);
  }
}

function drawMap() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(MAP[y][x], x, y);
    }
  }
}

function drawPlayer() {
  const px = player.x * TILE;
  const py = player.y * TILE;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(px+3, py+13, 10, 2);
  // body (red coat)
  ctx.fillStyle = '#d23a2a';
  ctx.fillRect(px+4, py+7, 8, 5);
  // head
  ctx.fillStyle = '#f0c090';
  ctx.fillRect(px+5, py+3, 6, 5);
  // hat
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(px+4, py+2, 8, 2);
  ctx.fillStyle = '#d23a2a';
  ctx.fillRect(px+6, py+1, 4, 1);
  // legs
  ctx.fillStyle = '#2a2a4a';
  ctx.fillRect(px+5, py+12, 2, 3);
  ctx.fillRect(px+9, py+12, 2, 3);
  // face direction hint
  ctx.fillStyle = '#1a1a1a';
  if (player.dir === 'down')  { ctx.fillRect(px+6, py+6, 1, 1); ctx.fillRect(px+9, py+6, 1, 1); }
  if (player.dir === 'up')    { /* back of head */ }
  if (player.dir === 'left')  { ctx.fillRect(px+5, py+6, 1, 1); }
  if (player.dir === 'right') { ctx.fillRect(px+10, py+6, 1, 1); }
}

function drawCritter(o, c, x, y) {
  // 32x32 sprite, generated procedurally per species so each looks distinct
  const col = c.color, ac = c.accent;
  // shadow
  o.fillStyle = 'rgba(0,0,0,0.3)';
  o.fillRect(x+8, y+28, 16, 3);

  if (c.name === 'BLOBLET') {
    o.fillStyle = col;
    o.fillRect(x+8,y+12,16,14);
    o.fillRect(x+10,y+10,12,2);
    o.fillRect(x+12,y+8,8,2);
    o.fillStyle = ac;
    o.fillRect(x+8,y+24,16,2);
    // leaf
    o.fillStyle = '#3a8a1f';
    o.fillRect(x+15,y+5,2,4);
    // eyes
    o.fillStyle = '#fff';
    o.fillRect(x+12,y+15,3,3); o.fillRect(x+18,y+15,3,3);
    o.fillStyle = '#000';
    o.fillRect(x+13,y+16,1,2); o.fillRect(x+19,y+16,1,2);
    // smile
    o.fillRect(x+14,y+21,4,1);
  } else if (c.name === 'EMBERFOX') {
    o.fillStyle = col;
    o.fillRect(x+10,y+14,12,10);
    // ears
    o.fillRect(x+10,y+10,3,4); o.fillRect(x+19,y+10,3,4);
    // tail flame
    o.fillRect(x+22,y+14,4,8);
    o.fillStyle = '#ffd44a';
    o.fillRect(x+24,y+12,3,4);
    // legs
    o.fillStyle = ac;
    o.fillRect(x+11,y+24,3,3); o.fillRect(x+18,y+24,3,3);
    // eyes
    o.fillStyle = '#000';
    o.fillRect(x+13,y+16,2,2); o.fillRect(x+18,y+16,2,2);
    // nose
    o.fillRect(x+15,y+19,2,1);
  } else if (c.name === 'PUDDLOPS') {
    o.fillStyle = col;
    o.fillRect(x+8,y+12,16,12);
    o.fillRect(x+10,y+10,12,2);
    // big eye
    o.fillStyle = '#fff';
    o.fillRect(x+13,y+14,7,7);
    o.fillStyle = '#000';
    o.fillRect(x+15,y+16,3,3);
    o.fillStyle = '#fff';
    o.fillRect(x+16,y+16,1,1);
    // drips
    o.fillStyle = ac;
    o.fillRect(x+9,y+24,2,3); o.fillRect(x+21,y+24,2,3);
  } else if (c.name === 'SHROOMP') {
    // cap
    o.fillStyle = col;
    o.fillRect(x+6,y+10,20,8);
    o.fillRect(x+8,y+8,16,2);
    o.fillStyle = '#fff';
    o.fillRect(x+10,y+12,3,3); o.fillRect(x+19,y+12,3,3); o.fillRect(x+14,y+14,2,2);
    // stem
    o.fillStyle = '#f0e0c0';
    o.fillRect(x+12,y+18,8,9);
    // eyes
    o.fillStyle = '#000';
    o.fillRect(x+14,y+22,1,2); o.fillRect(x+17,y+22,1,2);
  } else if (c.name === 'PEBBLOR') {
    o.fillStyle = col;
    o.fillRect(x+7,y+13,18,12);
    o.fillRect(x+9,y+11,14,2);
    o.fillRect(x+11,y+9,10,2);
    o.fillStyle = ac;
    o.fillRect(x+10,y+22,3,3); o.fillRect(x+19,y+22,3,3);
    // crystal
    o.fillStyle = '#7af0ff';
    o.fillRect(x+14,y+11,2,3); o.fillRect(x+15,y+10,1,1);
    // eyes
    o.fillStyle = '#000';
    o.fillRect(x+11,y+16,2,2); o.fillRect(x+19,y+16,2,2);
    // mouth
    o.fillRect(x+14,y+20,4,1);
  } else if (c.name === 'MOTHWING') {
    // wings
    o.fillStyle = col;
    o.fillRect(x+3,y+10,10,12);
    o.fillRect(x+19,y+10,10,12);
    o.fillStyle = ac;
    o.fillRect(x+5,y+14,4,4); o.fillRect(x+23,y+14,4,4);
    // body
    o.fillStyle = '#5a3a1a';
    o.fillRect(x+13,y+12,6,14);
    // antennae
    o.fillRect(x+13,y+8,1,4); o.fillRect(x+18,y+8,1,4);
    // eyes
    o.fillStyle = '#fff';
    o.fillRect(x+14,y+15,1,1); o.fillRect(x+17,y+15,1,1);
  } else if (c.name === 'GLIMMERAT') {
    o.fillStyle = col;
    o.fillRect(x+8,y+14,16,10);
    // ears
    o.fillRect(x+9,y+10,3,4); o.fillRect(x+20,y+10,3,4);
    o.fillStyle = ac;
    o.fillRect(x+10,y+11,1,2); o.fillRect(x+21,y+11,1,2);
    // tail
    o.fillStyle = ac;
    o.fillRect(x+24,y+18,3,2); o.fillRect(x+26,y+16,1,4);
    // sparkle
    o.fillStyle = '#ffcb47';
    o.fillRect(x+5,y+8,1,1); o.fillRect(x+27,y+9,1,1); o.fillRect(x+15,y+5,1,1);
    // eyes
    o.fillStyle = '#ff3a3a';
    o.fillRect(x+12,y+17,2,2); o.fillRect(x+18,y+17,2,2);
    // nose
    o.fillStyle = '#000';
    o.fillRect(x+15,y+20,2,1);
  }
}

function drawPickups() {
  for (const p of pickups) {
    if (!p.active) continue;
    const px = p.x * TILE, py = p.y * TILE;
    // gentle bob using time
    const bob = Math.floor(Math.sin(Date.now() / 300 + p.x) * 1);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(px+5, py+13, 6, 1);
    // ball — red top, white bottom, black band
    ctx.fillStyle = '#d23a2a';
    ctx.fillRect(px+5, py+5+bob, 6, 3);
    ctx.fillStyle = '#f0f0e0';
    ctx.fillRect(px+5, py+9+bob, 6, 3);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(px+5, py+8+bob, 6, 1);
    // center dot
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(px+7, py+8+bob, 2, 1);
    // sparkle
    ctx.fillStyle = '#ffcb47';
    ctx.fillRect(px+11, py+4+bob, 1, 1);
  }
}

function render() {
  drawMap();
  drawPickups();
  drawPlayer();
}

// ============================================================
// MOVEMENT & ENCOUNTERS
// ============================================================

function isWalkable(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
  const t = MAP[y][x];
  return t !== W && t !== R;
}

function tryMove(dx, dy) {
  if (inBattle) return;
  const nx = player.x + dx, ny = player.y + dy;
  if (dx === -1) player.dir = 'left';
  if (dx === 1)  player.dir = 'right';
  if (dy === -1) player.dir = 'up';
  if (dy === 1)  player.dir = 'down';
  if (!isWalkable(nx, ny)) { render(); return; }
  player.x = nx; player.y = ny;

  // pickup check
  const p = pickups.find(p => p.active && p.x === nx && p.y === ny);
  if (p) {
    const found = 2 + Math.floor(Math.random() * 3); // 2-4 balls
    balls += found;
    updateBalls();
    p.active = false;
    p.respawnAt = Date.now() + 30000; // 30s respawn
    setMsg(`Found ${found} balls!`);
  }

  render();
  // encounter check
  if (MAP[ny][nx] === T && Math.random() < 0.28) {
    setTimeout(startEncounter, 200);
  }
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowup' || k === 'w')    { e.preventDefault(); tryMove(0,-1); }
  if (k === 'arrowdown' || k === 's')  { e.preventDefault(); tryMove(0, 1); }
  if (k === 'arrowleft' || k === 'a')  { e.preventDefault(); tryMove(-1,0); }
  if (k === 'arrowright' || k === 'd') { e.preventDefault(); tryMove( 1,0); }
});

// Touch D-pad — click works on both mobile taps and desktop clicks
function bindDpad(id, dx, dy) {
  const btn = document.getElementById(id);
  if (!btn) { console.error('Button not found:', id); return; }
  btn.addEventListener('click', e => {
    e.preventDefault();
    tryMove(dx, dy);
  });
}
bindDpad('btnUp',    0, -1);
bindDpad('btnDown',  0,  1);
bindDpad('btnLeft', -1,  0);
bindDpad('btnRight', 1,  0);

// ============================================================
// ENCOUNTERS / BATTLE
// ============================================================

function pickWild() {
  // weighted by inverse rarity
  const weights = CRITTERS.map(c => 1 / c.rarity);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for (let i = 0; i < CRITTERS.length; i++) {
    r -= weights[i];
    if (r <= 0) return CRITTERS[i];
  }
  return CRITTERS[0];
}

function startEncounter() {
  wild = pickWild();
  wildHPMax = 20 + wild.rarity * 5;
  wildHP = wildHPMax;
  catchBonus = 0;
  inBattle = true;

  // draw critter on canvas (overlay)
  const sp = getSprite(wild.name);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,160,160);
  ctx.drawImage(sp, 64, 50);

  document.getElementById('battle').classList.add('active');
  document.getElementById('battleName').textContent = `WILD ${wild.name} APPEARED!`;
  document.getElementById('battleDesc').textContent = wild.desc;
  updateHP();
  setMsg(`A wild ${wild.name} blocks your path!`);
}

function updateHP() {
  document.getElementById('hpfill').style.width = (wildHP / wildHPMax * 100) + '%';
}

function endBattle(result = 'escaped') {
  inBattle = false;
  document.getElementById('battle').classList.remove('active');
  if (result === 'caught') {
    caught.add(wild.name);
    updateDex();
  }
  wild = null;
  render();
}

function setMsg(text) {
  document.getElementById('msg').textContent = text;
}

function updateBalls() { document.getElementById('balls').textContent = balls; }
function updateCaught() { document.getElementById('caught').textContent = caught.size; }
function updateParts() {
  document.getElementById('partBiomatter').textContent = parts.biomatter;
  document.getElementById('partShell').textContent = parts.shell;
  document.getElementById('partSpark').textContent = parts.spark;
}

function formatPartName(part) {
  return part[0].toUpperCase() + part.slice(1);
}

function defeatWild() {
  if (!wild) return;
  const rewards = [];
  for (const drop of (wild.drops || [])) {
    const qty = drop.min + Math.floor(Math.random() * (drop.max - drop.min + 1));
    if (qty <= 0) continue;
    parts[drop.part] += qty;
    rewards.push(`${qty} ${formatPartName(drop.part)}`);
  }
  updateParts();
  if (rewards.length) {
    setMsg(`${wild.name} was defeated! Salvaged: ${rewards.join(', ')}.`);
  } else {
    setMsg(`${wild.name} was defeated! No salvage this time.`);
  }
  endBattle('defeated');
}

function rarityStars(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function updateDex() {
  updateCaught();
  // header button + progress
  const dexCountEl = document.getElementById('dexCount');
  if (dexCountEl) dexCountEl.textContent = `(${caught.size}/${CRITTERS.length})`;
  const dexProgEl = document.getElementById('dexProgress');
  if (dexProgEl) dexProgEl.textContent = `${caught.size} / ${CRITTERS.length}`;
}

// Build the dex grid lazily — only when modal first opens.
// This avoids creating 7 offscreen canvases at page load, which was sometimes
// the cause of mobile "Script error" reports.
function buildDexGrid() {
  const grid = document.getElementById('dexGrid');
  if (!grid) return;
  grid.innerHTML = '';
  for (const c of CRITTERS) {
    const got = caught.has(c.name);
    const card = document.createElement('div');
    card.className = 'dex-card' + (got ? '' : ' uncaught');

    const sp = document.createElement('canvas');
    sp.width = 64; sp.height = 64;
    const sctx = sp.getContext('2d');
    if (sctx) {
      sctx.imageSmoothingEnabled = false;
      sctx.drawImage(getSprite(c.name), 0, 0, 32, 32, 0, 0, 64, 64);
    }

    const info = document.createElement('div');
    info.className = 'info';
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = got ? c.name : '???';
    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = got ? c.desc : 'Not yet discovered.';
    info.appendChild(name);
    info.appendChild(desc);

    const rarity = document.createElement('div');
    rarity.className = 'rarity';
    rarity.textContent = rarityStars(c.rarity);

    card.appendChild(sp);
    card.appendChild(info);
    card.appendChild(rarity);
    grid.appendChild(card);
  }
}

// open / close dex modal
const dexModal = document.getElementById('dexModal');
const openDexBtn = document.getElementById('openDex');
const closeDexBtn = document.getElementById('closeDex');
if (openDexBtn) {
  openDexBtn.addEventListener('click', () => {
    try {
      updateDex();
      buildDexGrid();
      dexModal.classList.add('open');
    } catch (err) {
      alert('Dex error: ' + err.message);
    }
  });
}
if (closeDexBtn) {
  closeDexBtn.addEventListener('click', () => dexModal.classList.remove('open'));
}
if (dexModal) {
  dexModal.addEventListener('click', e => {
    if (e.target === dexModal) dexModal.classList.remove('open');
  });
}

// catch formula: lower HP + bait/rock bonus + rarity penalty
function catchChance() {
  const hpFactor = 1 - (wildHP / wildHPMax) * 0.6; // 0.4 .. 1.0
  const base = 0.35 * hpFactor;
  const rarityPen = 1 - (wild.rarity - 1) * 0.12;
  return Math.min(0.95, Math.max(0.05, base * rarityPen + catchBonus));
}

document.getElementById('actThrow').addEventListener('click', () => {
  if (!inBattle) return;
  if (balls <= 0) { setMsg("You're out of balls!"); return; }
  balls--;
  updateBalls();
  const chance = catchChance();
  flash();
  setTimeout(() => {
    if (Math.random() < chance) {
      setMsg(`Gotcha! ${wild.name} was caught!`);
      endBattle('caught');
    } else {
      setMsg(`Oh no! ${wild.name} broke free!`);
      // wild may flee on close calls
      if (Math.random() < 0.15) {
        setMsg(`${wild.name} fled into the grass!`);
        endBattle('escaped');
      }
    }
  }, 400);
});

document.getElementById('actBait').addEventListener('click', () => {
  if (!inBattle) return;
  catchBonus = Math.min(0.4, catchBonus + 0.15);
  // bait calms but slightly heals
  wildHP = Math.min(wildHPMax, wildHP + 3);
  updateHP();
  setMsg(`You toss bait. ${wild.name} seems calmer.`);
});

document.getElementById('actRock').addEventListener('click', () => {
  if (!inBattle) return;
  // rock weakens (lower hp = easier catch) but agitates and can defeat
  wildHP = Math.max(0, wildHP - 5);
  catchBonus = Math.max(-0.1, catchBonus - 0.05);
  updateHP();
  if (wildHP <= 0) {
    defeatWild();
    return;
  }
  setMsg(`You hurl a rock! ${wild.name} is angry!`);
  if (Math.random() < 0.2) {
    setMsg(`${wild.name} ran off in a huff!`);
    endBattle('escaped');
  }
});

document.getElementById('actRun').addEventListener('click', () => {
  if (!inBattle) return;
  if (Math.random() < 0.85) {
    setMsg('Got away safely.');
    endBattle('escaped');
  } else {
    setMsg(`Couldn't escape! ${wild.name} is staring you down.`);
  }
});

function flash() {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillRect(0,0,160,160);
  setTimeout(() => {
    if (inBattle) {
      drawMap(); drawPlayer();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0,0,160,160);
      ctx.drawImage(getSprite(wild.name), 64, 50);
    }
  }, 120);
}

// init
updateBalls();
updateCaught();
updateParts();
updateDex();
render();

// keep the ball bob animated when not in battle
setInterval(() => { if (!inBattle) render(); }, 200);
</script>
